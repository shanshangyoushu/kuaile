<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客服中心</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#000000,#111111);
    color: #fff;
    height: 100vh;
    overflow: hidden;
}

/* 左侧发光文字 */
.left {
    position: fixed;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    color: #00ffcc;
    line-height: 1.8;
    text-shadow: 0 0 5px #00ffcc,0 0 10px #00ffff;
    animation: glow 1.5s infinite alternate;
}

/* 右侧闪烁红字 */
.right {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
    color: red;
    font-weight: bold;
    animation: flash 1s infinite;
}

/* 中心按钮 */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
}

button {
    padding: 15px 40px;
    font-size: 20px;
    background: #00ffcc;
    color: #000;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 0 15px #00ffcc;
    transition: 0.3s;
}

button:hover {
    background: #00ffff;
    box-shadow: 0 0 25px #00ffff;
}

/* 动态提示框 */
.status {
    margin-top: 20px;
    font-size: 18px;
    color: #fff;
    min-height: 24px;
    text-shadow: 0 0 3px #fff;
}

/* 闪烁动画 */
@keyframes flash {
    0% {opacity:1;}
    50% {opacity:0.2;}
    100% {opacity:1;}
}

/* 发光动画 */
@keyframes glow {
    0% { text-shadow: 0 0 5px #00ffcc,0 0 10px #00ffff; }
    100% { text-shadow: 0 0 20px #00ffcc,0 0 30px #00ffff; }
}

/* 响应式 */
@media screen and (max-width: 600px){
    .left,.right {font-size:16px;}
    button {font-size:18px;padding:12px 30px;}
    .status {font-size:16px;}
}
</style>
</head>
<body>

<div class="left">
全北京资源持续开发 🔞<br>
不坑不骗 诚实合作<br>
🈲未成年🈲
</div>

<div class="right">
如提示风险请继续添加
</div>

<div class="center">
<button onclick="jumpQQ()">联系客服</button>
<div class="status" id="status"></div>
</div>

<script>
// 客服列表 + 标签
var qqList = [
    {qq:"2380295181", label:"客服1（主客服）"},
    {qq:"3964292352", label:"客服2（备用）"},
    {qq:"2364041753", label:"客服3（高峰分流）"},
    {qq:"2380295181", label:"客服4（备用）"},
    {qq:"1032177536", label:"客服5（备用）"},
    {qq:"574565958", label:"客服6（备用）"}
];

// 跳转QQ
function jumpQQ(){
    var status = document.getElementById("status");
    status.textContent = "正在分配客服，请稍等...";
    
    // 随机选择一个客服
    var index = Math.floor(Math.random()*qqList.length);
    var selected = qqList[index];

    // 2秒后跳转
    setTimeout(function(){
        status.textContent = "已分配: " + selected.label + "，正在跳转QQ...";
        window.location.href = "https://wpa.qq.com/msgrd?v=3&uin=" + selected.qq + "&site=qq&menu=yes";
    },2000);
}
</script>

</body>
</html>
