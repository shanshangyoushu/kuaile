<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客服中心</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

/* 标题 */
.title{
    text-align:center;
    margin-top:20px;
    font-size:26px;
    color:#00ffcc;
    text-shadow:0 0 10px #00ffcc;
}

/* 列表 */
.grid{
    padding:20px;
}

/* 单项 */
.item{
    display:flex;
    align-items:center;
    justify-content:center;
    background:#111;
    margin-bottom:15px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 0 12px #00ffcc;
}

/* 左侧文字 */
.textBox{
    margin-right:20px;
}

/* 主提示 */
.mainText{
    color:#ff00ff;
    font-size:18px;
    text-shadow:0 0 10px #ff00ff;
}

/* 副提示 */
.subText{
    font-size:14px;
    margin-top:5px;
    color:#00ffcc;
}

/* 二维码 */
.qr{
    width:130px;
    height:130px;
    border-radius:6px;
    cursor:pointer;
}

/* 放大层 */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* 放大图片 */
.popup img{
    width:260px;
    height:260px;
}

/* 提示文字 */
.popupText{
    margin-top:15px;
    color:#00ffcc;
    animation:flash 1s infinite;
}

/* 动画 */
@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0.3;}
    100%{opacity:1;}
}

/* 手机适配 */
@media(max-width:600px){
    .item{
        flex-direction:column;
    }
    .textBox{
        margin:0 0 10px 0;
        text-align:center;
    }
}
</style>
</head>

        <div class="subText">无法添加请尝试其他二维码</div>
    </div>
    <img src="q3.png" class="qr" onclick="show(this)">
</div>

<div class="item">

        <div class="subText">无法添加请尝试其他二维码</div>
    </div>
    <img src="q4.png" class="qr" onclick="show(this)">
</div>

        <div class="subText">无法添加请尝试其他二维码</div>

<!-- 放大层 -->
<div class="popup" id="popup" onclick="hide()">
    <img id="big">
    <div class="popupText">长按二维码识别添加客服</div>
</div>

<script>
// 点击放大
function show(el){
    document.getElementById("popup").style.display="flex";
    document.getElementById("big").src=el.src;
}

// 关闭
function hide(){
    document.getElementById("popup").style.display="none";
}

// 进入提示
window.onload=function(){
    setTimeout(()=>{
        alert("请长按二维码识别添加客服");

}
</script>

</body>
</html>
