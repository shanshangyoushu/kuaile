<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客服中心</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
    text-align:center;
}

/* 标题 */
.title{
    margin-top:20px;
    font-size:26px;
    color:#00ffcc;
    text-shadow:0 0 10px #00ffcc;
}

/* 提示 */
.tip{
    color:red;
    margin:10px;
    animation:flash 1s infinite;
}

/* 二维码网格 */
.grid{
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:20px;
    padding:20px;
}

/* 单个客服 */
.item{
    background:#111;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px #00ffcc;
}

/* 二维码图片 */
.item img{
    width:120px;
    height:120px;
}

/* 文字 */
.item p{
    margin-top:10px;
}

/* 动画 */
@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0.3;}
    100%{opacity:1;}
}
</style>
</head>

<body>

<div class="title">
联系客服（扫码添加）
</div>

<div class="tip">
如提示风险请继续添加
</div>

<div class="grid">

<div class="item">
<img src="q1.png">
<p>客服1</p>
</div>

<div class="item">
<img src="q2.png">
<p>客服2</p>
</div>

<div class="item">
<img src="q3.png">
<p>客服3</p>
</div>

<div class="item">
<img src="q4.png">
<p>客服4</p>
</div>

<div class="item">
<img src="q5.png">
<p>客服5</p>
</div>

<div class="item">
<img src="q6.png">
<p>客服6</p>
</div>

</div>

</body>
</html>
